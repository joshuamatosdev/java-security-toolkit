server:
  port: 8081                              # the BFF (port 8080) relays here

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_RUNTIME_USER}          # NOSUPERUSER NOBYPASSRLS role, e.g. tenant_user
    password: ${DB_RUNTIME_PASSWORD}
  jpa:
    # The starter's classpath includes JPA. Hibernate must not open a metadata
    # connection at startup: the runtime pool is the tenant-bound proxy and a
    # boot-time borrow with no TenantContext fails closed (by design).
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none                      # init-db SQL owns the schema
    open-in-view: false
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Production must also set the issuer trusted by the BFF. Most integration tests
          # fabricate JWTs; SecurityBoundaryTest supplies a local public key for this boundary.
          # issuer-uri: https://idp.acme.example
          audiences:
            - ${JWT_AUDIENCE:edge-service-api}

tenant:
  isolation:
    mode: id                              # shared tables + RLS
  binding:
    claim-secret: ${TENANT_BINDING_CLAIM_SECRET}
    system-ops-password: ${TENANT_BINDING_SYSTEM_OPS_PASSWORD}
    organization-scope: optional          # off -> optional -> required

# authorization.enabled defaults to true: the starter wires the reference
# AuthorizationService, policy, rule repository, audit sink, and the servlet 403
# denial advice. Each bean backs off to an application-provided replacement.
