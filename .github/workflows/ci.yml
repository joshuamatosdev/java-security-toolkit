name: ci

on:
  push:
    branches: [main]
  schedule:
    # Weekly dependency CVE scan, independent of commit cadence.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Validate the committed gradle-wrapper.jar against Gradle's published checksums before it
          # runs. The wrapper JAR is the first code executed on every ./gradlew invocation.
          validate-wrappers: true

      - name: Build, test, and verify local publication metadata
        run: ./gradlew build publishToMavenLocal --console=plain --no-daemon

      - name: Build and test the consumer examples
        # Each example is a standalone composite build against the current checkout, so a module
        # change that breaks the documented adoption path fails here, not on an adopter's machine.
        run: |
          ./gradlew -p examples/crypto-plain-java build --console=plain --no-daemon
          ./gradlew -p examples/crypto-spring-boot build --console=plain --no-daemon
          ./gradlew -p examples/tenant-isolation-spring-boot build --console=plain --no-daemon
          ./gradlew -p examples/five-layer-spring-boot build --console=plain --no-daemon

      - name: Aggregate coverage
        # Gradle-built-in jacoco-report-aggregation: one repo-wide report from every module's
        # execution data (tests already ran in the build step; this only merges and reports).
        run: ./gradlew testCodeCoverageReport --console=plain --no-daemon

      - name: Publish coverage summary
        run: |
          xml=build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml
          echo "### Repository coverage" >> "$GITHUB_STEP_SUMMARY"
          python - "$xml" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse(sys.argv[1]).getroot()
          counters = {counter.get("type"): counter for counter in root.findall("counter")}
          for label, counter_type in (("Line", "LINE"), ("Branch", "BRANCH")):
              counter = counters[counter_type]
              missed = int(counter.get("missed"))
              covered = int(counter.get("covered"))
              total = missed + covered
              percent = 100 * covered / total if total else 0
              print(f"- {label}: **{percent:.1f}%** ({covered}/{total})")
          PY

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/jacoco/testCodeCoverageReport/

  dependency-scan:
    name: dependency CVE scan
    runs-on: ubuntu-latest
    # The external vulnerability scan is network-backed, so it runs on a schedule and on demand
    # rather than on every push, keeping the default build offline.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Generate every module's CycloneDX SBOM
        run: ./gradlew collectCycloneDxSboms --console=plain --no-daemon

      - name: Scan generated SBOMs with OSV
        run: |
          set -euo pipefail
          mapfile -t sboms < <(find build/reports/cyclonedx -name '*.cdx.json' -print | sort)
          if [ "${#sboms[@]}" -eq 0 ]; then
            echo "::error::No CycloneDX SBOMs were generated for scanning."
            exit 1
          fi
          args=(scan source)
          for sbom in "${sboms[@]}"; do
            args+=(--lockfile "$sbom")
          done
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/google/osv-scanner@sha256:64e86bec6df2466feea5137fc7c78fb3b7c21ec077f014d7130f64810e50676b \
            "${args[@]}"

      - name: Upload dependency SBOMs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-sboms
          path: build/reports/cyclonedx/*.cdx.json
