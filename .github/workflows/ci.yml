name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency CVE scan against a fresh NVD feed, independent of commit cadence.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Validate the committed gradle-wrapper.jar against Gradle's published checksums before it
          # runs. The wrapper JAR is the first code executed on every ./gradlew invocation.
          validate-wrappers: true

      - name: Build, test, and verify local publication metadata
        run: ./gradlew build publishToMavenLocal --console=plain --no-daemon

      - name: Build and test the consumer examples
        # Each example is a standalone composite build against the current checkout, so a module
        # change that breaks the documented adoption path fails here, not on an adopter's machine.
        run: |
          ./gradlew -p examples/crypto-plain-java build --console=plain --no-daemon
          ./gradlew -p examples/crypto-spring-boot build --console=plain --no-daemon
          ./gradlew -p examples/tenant-isolation-spring-boot build --console=plain --no-daemon
          ./gradlew -p examples/five-layer-spring-boot build --console=plain --no-daemon

      - name: Aggregate coverage
        # Gradle-built-in jacoco-report-aggregation: one repo-wide report from every module's
        # execution data (tests already ran in the build step; this only merges and reports).
        run: ./gradlew testCodeCoverageReport --console=plain --no-daemon

      - name: Publish coverage summary
        run: |
          xml=build/reports/jacoco/testCodeCoverageReport/testCodeCoverageReport.xml
          echo "### Repository coverage" >> "$GITHUB_STEP_SUMMARY"
          awk -F'"' '/<counter type="LINE"/{m=$4;c=$6} END{printf "- Line: **%.1f%%** (%d/%d)\n",100*c/(m+c),c,m+c}' "$xml" >> "$GITHUB_STEP_SUMMARY"
          awk -F'"' '/<counter type="BRANCH"/{m=$4;c=$6} END{printf "- Branch: **%.1f%%** (%d/%d)\n",100*c/(m+c),c,m+c}' "$xml" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/jacoco/testCodeCoverageReport/

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4

  dependency-scan:
    name: dependency CVE scan
    runs-on: ubuntu-latest
    # The OWASP scan needs the NVD feed (network + API key), so it runs on a schedule and on demand
    # rather than on every push — keeping the default build offline (see ADR-0005).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Require NVD API key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY secret is required for dependencyCheckAggregate."
            exit 1
          fi

      - name: Scan every module's dependency closure for high-severity CVEs
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckPurge dependencyCheckAggregate --console=plain --no-daemon
