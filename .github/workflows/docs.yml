# Publishes every published module's Javadoc to GitHub Pages as one browsable site.
# Assembly happens in shell from each module's own javadoc task output — no extra build
# logic or aggregation plugin in the Gradle build.
name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  javadoc:
    name: build and publish javadoc
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Generate Javadoc
        run: ./gradlew javadoc --console=plain --no-daemon

      - name: Assemble the site
        run: |
          modules="shared shared-testkit \
            tenant-isolation tenant-isolation-spring-boot-starter tenant-isolation-testkit \
            authorization authorization-spring-boot-starter authorization-testkit \
            edge edge-spring-boot-starter edge-testkit \
            supply-chain supply-chain-testkit \
            crypto crypto-spring-boot-starter crypto-testkit"
          mkdir -p site
          {
            echo "<!doctype html><meta charset=\"utf-8\"><title>Java Security Toolkit API documentation</title>"
            echo "<h1>Java Security Toolkit API documentation</h1><ul>"
          } > site/index.html
          for m in $modules; do
            if [ -d "$m/build/docs/javadoc" ]; then
              mkdir -p "site/$m"
              cp -r "$m/build/docs/javadoc/." "site/$m/"
              echo "<li><a href=\"$m/\">$m</a></li>" >> site/index.html
            fi
          done
          echo "</ul>" >> site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload the site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
