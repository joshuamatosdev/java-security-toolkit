# Cut a release from a version tag: full verification build, then a GitHub Release with
# generated notes. Artifact publication to Maven Central is deliberately a placeholder until
# the namespace, signing key, and portal credentials exist (see PUBLIC_RELEASE_CHECKLIST).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - name: Check out the tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Build, test, and verify publication metadata
        run: ./gradlew build publishToMavenLocal --console=plain --no-daemon

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"

      # - name: Publish to Maven Central
      #   Enable once the io.github.joshuamatosdev namespace is verified and the signing key +
      #   portal token are configured as repository secrets. Until then, releases are source +
      #   GitHub Release only.
      #   run: ./gradlew publish --console=plain --no-daemon
