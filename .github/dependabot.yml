version: 2

updates:
  # Keeps the pins the supply-chain module verifies fresh: the freshness half of the story
  # whose immutability half ActionPinPolicy and WrapperPinPolicy enforce. Routine updates
  # batch weekly and grouped to keep review load low; security updates open immediately.
  - package-ecosystem: gradle
    directories:
      - /
      - /examples/crypto-plain-java
      - /examples/crypto-spring-boot
      - /examples/tenant-isolation-spring-boot
      - /examples/five-layer-spring-boot
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
