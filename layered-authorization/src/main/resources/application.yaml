spring:
  application:
    name: layered-authorization
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none          # init-db SQL owns the schema
    open-in-view: false
# PostgreSQL 18 owns document identifier creation through the id_v7 domain default (uuidv7()).
# For standalone bootRun, supply SPRING_DATASOURCE_* against a database initialized with the same
# schema contract as src/test/resources/db/layered-authz-init.sql.

# Runnable-showcase demo identity is intentionally not enabled in the packaged default config.
# Activate the `showcase` profile for local demos, or provide an explicit deployment identity
# integration. Keeping the main artifact default-off prevents demo credentials and trusted actors
# from reaching a deployment by omission.
showcase:
  demo-identity: false
